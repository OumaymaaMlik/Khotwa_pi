spring.application.name=khotwa

# Base de données
spring.datasource.url=jdbc:mysql://localhost:3306/khotwa?createDatabaseIfNotExist=true&zeroDateTimeBehavior=CONVERT_TO_NULL&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Serveur
server.port=8084
server.servlet.context-path=/khotwa

# Upload de fichiers
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Gemini API
ai.gemini.api-key=""
ai.gemini.model=gemini-1.5-flash
spring.security.oauth2.client.registration.linkedin.client-id=TON_ID
spring.security.oauth2.client.registration.linkedin.client-secret=TON_SECRET
spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.linkedin.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.linkedin.scope=openid,profile,email

spring.security.oauth2.client.provider.linkedin.authorization-uri=https://www.linkedin.com/oauth/v2/authorization
spring.security.oauth2.client.provider.linkedin.token-uri=https://www.linkedin.com/oauth/v2/accessToken
spring.security.oauth2.client.provider.linkedin.user-info-uri=https://api.linkedin.com/v2/userinfo
spring.security.oauth2.client.provider.linkedin.user-name-attribute=sub

# Email notifications (configure with a Gmail app password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.notification.admin-email=admin@khotwa.local
# JWT
app.jwt.secret=your-super-secret-jwt-key-change-in-production-1234567890
app.jwt.expiration-ms=86400000   # 24 hours

# Existing properties remain unchanged