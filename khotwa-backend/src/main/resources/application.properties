spring.application.name=khotwa


# Base de donnees
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/khotwa?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Serveur
server.port=8084
server.servlet.context-path=/khotwa

# Upload de fichiers
app.upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.password=${MAIL_PASSWORD:}

# JWT
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000
app.jwt.expiration=86400000

# Google OAuth2
google.client.id=${GOOGLE_CLIENT_ID:}

# Spring Main
spring.main.allow-bean-definition-overriding=true
spring.data.web.pageable.serialization-mode=via-dto

# Churn scoring
churn.scoring.expiry-warning-days=7
churn.scoring.recalculate-after-hours=24

# Anthropic
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Google Gemini Configuration (Spring AI 1.1.4)
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.7
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001
spring.ai.retry.max-attempts=3

# Nudging
khotwa.nudging.seuil-n1-heures=5
khotwa.nudging.seuil-n2-heures=10
khotwa.nudging.cron=0 * * * * *

# Vector Store
app.vector-store.path=${VECTOR_STORE_PATH:./vector-store.json}

groq.api.key=


