spring.application.name=khotwa

# Base de données
spring.datasource.url=jdbc:mysql://localhost:3306/khotwa?createDatabaseIfNotExist=true&zeroDateTimeBehavior=CONVERT_TO_NULL&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Serveur
server.port=8084
server.servlet.context-path=/khotwa

# Upload de fichiers
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Gemini API
ai.gemini.api-key=""
ai.gemini.model=gemini-1.5-flash
