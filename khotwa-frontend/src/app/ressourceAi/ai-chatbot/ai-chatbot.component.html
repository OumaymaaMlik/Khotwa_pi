<div class="chatbot-wrapper">

  <!-- Bouton flottant -->
  <button class="chat-fab" (click)="toggleChat()" [class.open]="isOpen" title="Assistant IA Khotwa">
    <svg *ngIf="!isOpen" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      <circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="12" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/>
    </svg>
    <svg *ngIf="isOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
    <span class="chat-fab-badge" *ngIf="!isOpen">IA</span>
  </button>

  <!-- Fenêtre chat -->
  <div class="chat-window" [class.visible]="isOpen">

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </div>
        <div>
          <div class="chat-header-name">Assistant Khotwa</div>
          <div class="chat-header-status">
            <span class="status-dot"></span>
            En ligne · IA
          </div>
        </div>
      </div>
      <button class="chat-header-clear" (click)="clearHistory()" title="Nouvelle conversation">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
        </svg>
      </button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" #messagesContainer>

      <!-- Questions rapides (si 1 seul message) -->
      <div class="quick-questions" *ngIf="messages.length === 1">
        <p class="quick-label">💡 Suggestions :</p>
        <button class="quick-btn" *ngFor="let q of quickQuestions" (click)="sendQuickQuestion(q)">
          {{ q }}
        </button>
      </div>

      <!-- Bulles de messages -->
      <div *ngFor="let msg of messages" class="msg-row" [class.msg-row--user]="msg.role === 'user'">

        <!-- Avatar assistant -->
        <div class="msg-avatar" *ngIf="msg.role === 'assistant'">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/>
          </svg>
        </div>

        <div class="msg-content">
          <!-- Bulle texte -->
          <div class="msg-bubble" [class.msg-bubble--user]="msg.role === 'user'" [class.msg-bubble--ai]="msg.role === 'assistant'">
            {{ msg.content }}
          </div>

          <!-- Ressources trouvées -->
          <div class="msg-resources" *ngIf="msg.ressources && msg.ressources.length > 0">
            <p class="msg-resources-title">📚 Ressources recommandées :</p>
            <div class="resource-chip" *ngFor="let r of msg.ressources" (click)="openResource(r)" style="cursor:pointer">
              <span class="resource-chip-icon">
                <i [class]="'bi ' + getTypeIcon(r.type)"></i>
              </span>
              <div class="resource-chip-body">
                <span class="resource-chip-title">{{ r.titre }}</span>
                <span class="resource-chip-plan" [class]="getPlanBadge(r.planType)">{{ r.planType }}</span>
              </div>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#FF6B35" stroke-width="2.5" style="flex-shrink:0;margin-left:4px">
                <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
              </svg>
            </div>
          </div>
        </div>

      </div>

      <!-- Indicateur de chargement -->
      <div class="msg-row" *ngIf="isLoading">
        <div class="msg-avatar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/>
          </svg>
        </div>
        <div class="msg-bubble msg-bubble--ai typing-bubble">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>

    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <textarea
        class="chat-input"
        placeholder="Dis-moi ce que tu cherches…"
        [(ngModel)]="inputMessage"
        (keydown)="onKeydown($event)"
        rows="1"
        [disabled]="isLoading"
      ></textarea>
      <button class="chat-send-btn" (click)="sendMessage()" [disabled]="isLoading || !inputMessage.trim()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>
</div>
