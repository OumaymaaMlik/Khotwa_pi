<div class="ai-search-wrapper">

  <!-- Barre de recherche uniquement — plus de dropdown -->
  <div class="ai-search-box" [class.ai-active]="isAiMode">

    <span class="ai-search-icon">
      <ng-container *ngIf="!isAiMode">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </ng-container>
      <ng-container *ngIf="isAiMode">
        <span class="ai-spark">✦</span>
      </ng-container>
    </span>

    <input
      type="text"
      class="ai-search-input"
      placeholder="Recherche intelligente… (ex: financement startup)"
      [(ngModel)]="query"
      (input)="onInput()"
      autocomplete="off"
    />

    <span class="ai-search-right">
      <span class="ai-spinner" *ngIf="isLoading"></span>
      <button class="ai-clear-btn" *ngIf="!isLoading && query" (click)="clear()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </span>

    <span class="ai-mode-badge" *ngIf="isAiMode">IA</span>
  </div>

</div>
