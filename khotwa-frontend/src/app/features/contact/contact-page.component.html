<div class="contact-page">
  <div class="contact-header">
    <h1>Contact & Support</h1>
    <p>Reach the admin directly or share feedback to help us improve Khotwa.</p>
  </div>

  <div class="card-grid">
    <button class="support-card" type="button" (click)="goToAdminChat()">
      <h3>Contact Support</h3>
      <p>Open your messaging tab and start a conversation with the admin instantly.</p>
      <span>Talk to Admin</span>
    </button>

    <button class="support-card alt" type="button" (click)="showFeedbackForm = !showFeedbackForm">
      <h3>Share Feedback</h3>
      <p>Submit a rating, topic, and comment. You can also attach a screenshot.</p>
      <span>{{ showFeedbackForm ? 'Hide Form' : 'Submit Feedback' }}</span>
    </button>
  </div>

  <form *ngIf="showFeedbackForm" class="feedback-form" (ngSubmit)="submitFeedback()">
    <label>Rating *</label>
    <div class="stars">
      <button type="button" *ngFor="let star of [1,2,3,4,5]" (click)="setRating(star)" [class.active]="star <= form.rating">★</button>
    </div>

    <label for="subject">Subject *</label>
    <select id="subject" [(ngModel)]="form.subject" name="subject" required>
      <option value="" disabled>Select a subject</option>
      <option *ngFor="let subject of subjects" [value]="subject">{{ subject }}</option>
    </select>

    <label for="comment">Comment *</label>
    <textarea id="comment" rows="5" [(ngModel)]="form.comment" name="comment" maxlength="2000" required></textarea>

    <label for="screenshot">Screenshot (optional)</label>
    <input #screenshotInput id="screenshot" type="file" (change)="onFileSelected($event)" accept="image/*,.pdf" />
    <div class="attachment-row" *ngIf="selectedFile">
      <span class="attachment-name">{{ selectedFile.name }}</span>
      <button type="button" class="remove-attachment" (click)="clearSelectedFile(screenshotInput)">x</button>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="submitting">{{ submitting ? 'Submitting...' : 'Send Feedback' }}</button>
    </div>

    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </form>
</div>
