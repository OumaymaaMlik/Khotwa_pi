<div class="page">
  <div class="page-header" *ngIf="showHeader">
    <div>
      <h1 class="kh-page-title">Collaborations</h1>
      <p class="page-sub">Manage and view collaboration workspaces.</p>
    </div>

    <div class="collaboration-page-actions" *ngIf="auth.isAdmin">
      <a routerLink="/khotwaadmin/collaborations/weekly-report" class="kh-btn kh-btn--ghost">Weekly Report</a>
      <a routerLink="/khotwaadmin/collaborations/ai-recommendations" class="kh-btn kh-btn--primary">AI Recommendations</a>
    </div>
  </div>

  <div *ngIf="showBody && error" class="kh-card collab-alert collab-alert--error">{{ error }}</div>

  <div *ngIf="showBody && loading" class="kh-card collab-empty">Loading collaborations...</div>

  <div *ngIf="showBody && !loading && collaborations.length" class="collaboration-grid">
    <app-collaboration-card
      *ngFor="let collaboration of collaborations; trackBy: trackByCollaboration"
      [collaboration]="collaboration"
      (open)="onOpenCollaboration($event)">
    </app-collaboration-card>
  </div>

  <div *ngIf="showBody && !loading && !collaborations.length" class="kh-card collab-empty">
    <h2 class="kh-section-title">{{ emptyStateTitle || 'No collaborations yet' }}</h2>
    <p>{{ emptyStateDescription || 'No collaborations were returned by the backend.' }}</p>
  </div>
</div>
