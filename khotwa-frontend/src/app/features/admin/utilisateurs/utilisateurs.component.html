<div class="page animate-1">
  <div class="page-header">
    <div>
      <h1 class="kh-page-title">User Management</h1>
      <p class="page-sub">{{ totalElements }} user(s)</p>
    </div>
    <button class="kh-btn kh-btn--primary">+ Invite user</button>
  </div>

  <div class="filters animate-2">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" placeholder="Search…" [(ngModel)]="search" (input)="onFilterChange()" />
    </div>
    
    <button class="tab" [class.active]="filtre==='all'" (click)="filtre='all'; onFilterChange()">All</button>
    <button class="tab" [class.active]="filtre==='admin'" (click)="filtre='admin'; onFilterChange()">Admin</button>
    <button class="tab" [class.active]="filtre==='entrepreneur'" (click)="filtre='entrepreneur'; onFilterChange()">Entrepreneurs</button>
    <button class="tab" [class.active]="filtre==='coach'" (click)="filtre='coach'; onFilterChange()">Coachs</button>
  </div>

  <div class="table-wrap animate-3">
    <div *ngIf="loading" class="loading-overlay">Loading...</div>

    <table *ngIf="!loading">
      <thead>
        <tr>
          <th>User</th>
          <th>Email</th>
          <th>Role</th>
          <th>Plan</th> <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users">
          <td><strong>{{ u.firstName }} {{ u.lastName }}</strong></td>
          <td style="color:var(--text-secondary)">{{ u.emailAddress }}</td>
          <td>
  <span class="kh-badge" 
    [class.kh-badge--orange]="u.role === 'ADMIN'"
    [class.kh-badge--teal]="u.role === 'ENTREPRENEUR'"
    [class.kh-badge--violet]="u.role === 'COACH'">
    {{ u.role }}
  </span>
</td>
          <td><span class="plan-info">{{ u.planType }}</span></td>
          
          <td>
            <div class="actions">
              <button class="kh-btn kh-btn--ghost kh-btn--sm">Edit</button>
              <button class="kh-btn kh-btn--danger kh-btn--sm">Delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    
    <div class="pagination-controls" *ngIf="totalElements > pageSize">
      <button [disabled]="currentPage === 0" (click)="prevPage()" class="kh-btn kh-btn--sm">Previous</button>
      <span>Page {{ currentPage + 1 }}</span>
      <button [disabled]="(currentPage + 1) * pageSize >= totalElements" (click)="nextPage()" class="kh-btn kh-btn--sm">Next</button>
    </div>
  </div>
</div>
