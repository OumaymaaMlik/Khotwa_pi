<div class="page animate-1">
  <div class="page-header">
    <h1 class="kh-page-title">Notifications</h1>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs animate-2">
    <button class="filter-tab" [class.active]="activeFilter==='all'" (click)="activeFilter='all'">All</button>
    <button class="filter-tab" [class.active]="activeFilter==='unread'" (click)="activeFilter='unread'">Unread</button>
    <button class="filter-tab" [class.active]="activeFilter==='messages'" (click)="activeFilter='messages'">Messages</button>
    <button class="filter-tab" [class.active]="activeFilter==='resolved'" (click)="activeFilter='resolved'">Resolved</button>
  </div>

  <!-- Action bar -->
  <div class="action-bar animate-2" *ngIf="filteredNotifications.length > 0">
    <div class="action-bar__left">
      <button class="action-btn" (click)="checkAll()">Check all</button>
      <button class="action-btn" (click)="uncheckAll()">Uncheck all</button>
    </div>
    <div class="action-bar__right" *ngIf="hasChecked">
      <button class="action-btn action-btn--read" (click)="markSelectedRead()">Mark as read</button>
      <button class="action-btn action-btn--unread" (click)="markSelectedUnread()">Mark as unread</button>
      <button class="action-btn action-btn--delete" (click)="deleteSelected()">Delete</button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" style="text-align:center;padding:40px;color:var(--text-muted)">
    Loading notifications...
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && filteredNotifications.length === 0" class="empty-state animate-2">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <p>No notifications here</p>
  </div>

  <!-- Grouped notifications -->
  <div *ngFor="let group of groupedNotifications" class="notif-group animate-2">
    <p class="group-label">{{ group.label }}</p>
    <div class="kh-card notif-list">
      <div *ngFor="let n of group.items"
           class="notif-row"
           [class.unread]="!n.read"
           (click)="toggleCheck(n.id)">
        <input type="checkbox"
               class="notif-checkbox"
               [checked]="isChecked(n.id)"
               (click)="$event.stopPropagation(); toggleCheck(n.id)" />
        <div class="notif-dot" [class.dot-unread]="!n.read"></div>
        <div class="notif-content">
          <p class="notif-title">
            {{ n.type === 'NEW_MESSAGE' ? 'New Message' : n.type === 'STATUS_UPDATED' ? 'Message Read' : 'Ticket Resolved' }}
          </p>
          <p class="notif-msg">{{ n.message }}</p>
        </div>
        <span class="notif-time">{{ relativeTime(n.createdAt) }}</span>
      </div>
    </div>
  </div>
</div>
