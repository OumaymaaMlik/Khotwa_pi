<div class="login">
  <div class="bg"></div>
  <div class="glow"></div>

  <div class="content">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
        </svg>
      </div>
      <span class="brand-name">KHOTWA</span>
    </div>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button
        type="button"
        class="tab-btn"
        [class.active]="mode === 'signin'"
        (click)="mode='signin'">
        Sign In
      </button>

      <button
        type="button"
        class="tab-btn"
        [class.active]="mode === 'signup'"
        (click)="mode='signup'">
        Sign Up
      </button>
    </div>

    <!-- SIGN IN -->
    <form class="auth-form" *ngIf="mode === 'signin'" (ngSubmit)="signIn()">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your KHOTWA account</p>

      <div class="form-group">
        <label for="signin-email">Email address</label>
        <input
          id="signin-email"
          name="signinEmail"
          type="email"
          [(ngModel)]="emailAddress"
          placeholder="you@example.com"
          class="form-input"
          autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="signin-password">Password</label>
        <input
          id="signin-password"
          name="signinPassword"
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          class="form-input"
          autocomplete="current-password" />
      </div>

      <p class="form-error" *ngIf="error">{{ error }}</p>

      <button type="submit" class="btn-submit">Sign In →</button>

      <p class="form-switch">
        Don't have an account?
        <a (click)="mode='signup'">Sign up</a>
      </p>
    </form>

    <!-- SIGN UP -->
    <form class="auth-form" *ngIf="mode === 'signup'" (ngSubmit)="signUp()">
      <h1>Create your account</h1>
      <p class="subtitle">Join KHOTWA and start your journey</p>

      <div class="form-row">
        <div class="form-group">
          <label for="signup-firstname">First name</label>
          <input
            id="signup-firstname"
            name="firstName"
            type="text"
            [(ngModel)]="firstName"
            placeholder="Sara"
            class="form-input"
            autocomplete="given-name" />
        </div>

        <div class="form-group">
          <label for="signup-lastname">Last name</label>
          <input
            id="signup-lastname"
            name="lastName"
            type="text"
            [(ngModel)]="lastName"
            placeholder="Trabelsi"
            class="form-input"
            autocomplete="family-name" />
        </div>
      </div>

      <div class="form-group">
        <label for="signup-email">Email address</label>
        <input
          id="signup-email"
          name="signupEmail"
          type="email"
          [(ngModel)]="emailAddress"
          placeholder="you@example.com"
          class="form-input"
          autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="signup-password">Password</label>
        <input
          id="signup-password"
          name="signupPassword"
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          class="form-input"
          autocomplete="new-password" />
      </div>

      <div class="form-group">
        <label>I am a…</label>
        <div class="role-pick">
          <div
            *ngFor="let r of roles"
            class="role-pick-card"
            [class.selected]="selectedRole === r.role"
            [style.--c]="r.color"
            (click)="selectedRole = r.role">
            <span class="rp-icon">{{ r.icon }}</span>
            <span class="rp-label">{{ r.label }}</span>
          </div>
        </div>
      </div>

      <p class="form-error" *ngIf="error">{{ error }}</p>

      <button type="submit" class="btn-submit">Create account →</button>

      <p class="form-switch">
        Already have an account?
        <a (click)="mode='signin'">Sign in</a>
      </p>
    </form>
  </div>
</div>
