<footer class="kh-footer">
  <div class="kh-footer__inner">
    <div class="kh-footer__brand">
      <div class="kh-footer__logo">
        <img src="assets/khotwa-logo.png" alt="KHOTWA" class="kh-footer__logo-img" />
        <span class="kh-footer__name">KHOTWA</span>
      </div>
      <p class="kh-footer__tagline">Multi-role incubation platform for ambitious entrepreneurs and dedicated coaches.</p>
    </div>

    <div class="kh-footer__links">
      <div class="kh-footer__col">
        <p class="kh-footer__col-title">Product</p>
        <ul>
          <li><a href="#">Features</a></li>
          <li><a href="#">Library</a></li>
          <li><a href="#">Planning</a></li>
        </ul>
      </div>

      <div class="kh-footer__col">
        <p class="kh-footer__col-title">Support</p>
        <ul>
          <li><a href="#">Documentation</a></li>
          <li><a href="#">Help center</a></li>
          <li *ngIf="showContactLink"><a [routerLink]="contactRoute">Contact</a></li>
        </ul>
      </div>

      <div class="kh-footer__col">
        <p class="kh-footer__col-title">Legal</p>
        <ul>
          <li><a href="#">Privacy</a></li>
          <li><a href="#">Terms</a></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="kh-footer__bottom">
    <p>© {{ currentYear }} KHOTWA. All rights reserved.</p>
    <div class="kh-footer__socials">
      <a href="#" title="LinkedIn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </a>
      <a href="#" title="Twitter/X">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
      </a>
    </div>
  </div>
</footer>
