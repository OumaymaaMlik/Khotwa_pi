<!-- ═══════════════════════════════════════════════════
     KHOTWA — Layout VISITOR
     Navbar top dorée / ambre, accès lecture seule
════════════════════════════════════════════════════ -->
<div class="visitor-shell">

  <!-- ── NAVBAR ─────────────────────────────────────── -->
  <nav class="visitor-nav">
    <div class="visitor-nav__inner">

      <!-- Brand -->
      <a class="visitor-brand" routerLink="/visitor/events">
        <img src="assets/khotwa-logo.png" alt="KHOTWA" class="visitor-brand__logo" />
      </a>

      <!-- Nav links -->
      <div class="visitor-nav__links">
        <a class="visitor-link"
           routerLink="/visitor/events"
           routerLinkActive="visitor-link--active">
          <span class="visitor-link__icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
          <span>Events</span>
        </a>
        <a class="visitor-link"
           routerLink="/visitor/talent"
           routerLinkActive="visitor-link--active">
          <span class="visitor-link__icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </span>
          <span>Talent Market</span>
        </a>
      </div>

      <!-- Right actions -->
      <div class="visitor-nav__actions">

        <!-- Read-only badge -->
        <div class="visitor-readonly-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Read-only access
        </div>

        <!-- Upgrade CTA -->
        <a routerLink="/login" class="visitor-upgrade-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          Join KHOTWA
        </a>

        <!-- User / logout -->
        <div class="visitor-user" (click)="logout()" title="Sign out">
          <div class="visitor-user__avatar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="visitor-user__name">{{ userName }}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.4">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </div>

      </div>

      <!-- Burger mobile -->
      <button class="visitor-burger" (click)="menuOpen=!menuOpen"
              [class.open]="menuOpen">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- Accent bar -->
    <div class="visitor-accent-bar">
      <div class="visitor-accent-bar__glow"></div>
    </div>
  </nav>

  <!-- Mobile nav -->
  <div class="visitor-mobile-nav" [class.open]="menuOpen">
    <a routerLink="/visitor/events"  class="visitor-mobile-link" (click)="menuOpen=false">📅 Events</a>
    <a routerLink="/visitor/talent"  class="visitor-mobile-link" (click)="menuOpen=false">👤 Talent Market</a>
    <a routerLink="/login"           class="visitor-mobile-link visitor-mobile-link--cta" (click)="menuOpen=false">🚀 Join KHOTWA</a>
  </div>
  <div class="visitor-overlay" *ngIf="menuOpen" (click)="menuOpen=false"></div>

  <!-- ── CONTENU ─────────────────────────────────────── -->
  <main class="visitor-main">
    <div class="visitor-content">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Footer -->
  <app-footer></app-footer>

</div>
