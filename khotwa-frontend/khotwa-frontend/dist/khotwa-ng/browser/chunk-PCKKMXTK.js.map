<div class="vis-page">
  <h1>Mon profil talent</h1>
  <p class="vis-sub">Aligné sur <code>TalentProfileDTO</code> — utilisé pour postuler aux annonces.</p>

  <div *ngIf="loadError" class="vis-alert vis-alert--warn">{{ loadError }}</div>
  <div *ngIf="success" class="vis-alert vis-alert--ok">{{ success }}</div>
  <div *ngIf="saveError" class="vis-alert vis-alert--err">{{ saveError }}</div>

  <form class="vis-form" (ngSubmit)="save()">
    <div class="vis-row2">
      <div class="vis-field">
        <label for="prenom">Prénom</label>
        <input id="prenom" name="prenom" [(ngModel)]="form.prenom" required />
      </div>
      <div class="vis-field">
        <label for="nom">Nom</label>
        <input id="nom" name="nom" [(ngModel)]="form.nom" required />
      </div>
    </div>
    <div class="vis-field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" [(ngModel)]="form.email" required />
    </div>
    <div class="vis-field">
      <label for="tel">Téléphone</label>
      <input id="tel" name="tel" [(ngModel)]="form.telephone" />
    </div>
    <div class="vis-field">
      <label for="bio">Bio</label>
      <textarea id="bio" name="bio" rows="3" [(ngModel)]="form.bio"></textarea>
    </div>
    <div class="vis-field">
      <label for="comp">Compétences <span class="hint">(séparées par des virgules)</span></label>
      <input id="comp" name="comp" [(ngModel)]="form.competences" placeholder="Java, Spring, Angular" />
    </div>
    <div class="vis-field">
      <label for="dip">Diplômes <span class="hint">(séparés par des virgules)</span></label>
      <input id="dip" name="dip" [(ngModel)]="form.diplomes" />
    </div>
    <div class="vis-field">
      <label for="nx">Niveau d’expérience</label>
      <select id="nx" name="nx" [(ngModel)]="form.niveauExperience">
        <option *ngFor="let o of niveaux" [ngValue]="o.v">{{ o.l }}</option>
      </select>
    </div>
    <div class="vis-row2">
      <div class="vis-field">
        <label for="cv">URL CV</label>
        <input id="cv" name="cv" [(ngModel)]="form.cvUrl" placeholder="https://…" />
      </div>
      <div class="vis-field">
        <label for="li">LinkedIn</label>
        <input id="li" name="li" [(ngModel)]="form.linkedinUrl" placeholder="https://linkedin.com/in/…" />
      </div>
    </div>

    <button type="submit" class="vis-submit" [disabled]="loading">
      {{ loading ? 'Enregistrement…' : (isUpdate ? 'Mettre à jour' : 'Créer mon profil') }}
    </button>
  </form>
</div>
