<div class="page animate-1">
  <div class="page-header"><h1 class="kh-page-title">Messages</h1></div>
  <div class="chat-layout animate-2">
    <div class="conv-panel kh-card">
      <div class="conv-search">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Search…" />
      </div>
      <div class="conv-list">
        <div *ngFor="let c of conversations" class="conv-item" [class.active]="selectedConv?.id===c.id" (click)="selectConv(c)">
          <div class="conv-avatar" [style.background]="c.color">{{ c.initials }}</div>
          <div class="conv-info">
            <div class="conv-top"><span class="conv-name">{{ c.nom }}</span><span class="conv-time">{{ c.time }}</span></div>
            <p class="conv-preview">{{ c.lastMsg }}</p>
          </div>
          <span *ngIf="c.unread > 0" class="unread-badge">{{ c.unread }}</span>
        </div>
      </div>
    </div>
    <div class="chat-area kh-card">
      <ng-container *ngIf="selectedConv; else emptyChat">
        <div class="chat-header">
          <div class="conv-avatar" [style.background]="selectedConv.color" style="width:36px;height:36px;font-size:12px">{{ selectedConv.initials }}</div>
          <div><p class="conv-name">{{ selectedConv.nom }}</p><p class="online-status"><span class="dot-live dot-live--green"></span> En ligne</p></div>
        </div>
        <div class="messages-body">
          <div *ngFor="let m of selectedConv.messages" class="msg-wrap" [class.mine]="m.mine">
            <div class="msg-bubble" [class.mine]="m.mine">
              <p>{{ m.text }}</p>
              <span class="msg-time">{{ m.time }}</span>
            </div>
          </div>
        </div>
        <div class="chat-input">
          <button class="input-icon-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="text" placeholder="Write a message…" [(ngModel)]="newMsg" (keydown)="onMsgKey($event)" />
          <button class="send-btn" (click)="sendMsg()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </ng-container>
      <ng-template #emptyChat>
        <div class="empty-chat">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <p>Select a conversation</p>
        </div>
      </ng-template>
    </div>
  </div>
</div>
