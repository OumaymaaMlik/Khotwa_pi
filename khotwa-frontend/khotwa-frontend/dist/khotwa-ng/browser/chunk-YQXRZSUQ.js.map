<div class="page animate-1">
  <div class="page-header">
    <div><h1 class="kh-page-title">Subscription Management</h1><p class="page-sub">{{ filteredSubscriptions.length }} subscription(s)</p></div>
    <button class="kh-btn kh-btn--primary">+ Assign plan</button>
  </div>
  <div class="kpi-row animate-2">
    <div class="mini-kpi"><span class="mini-kpi__val">12</span><span class="mini-kpi__label">Active premium</span></div>
    <div class="mini-kpi"><span class="mini-kpi__val">6</span><span class="mini-kpi__label">Free</span></div>
    <div class="mini-kpi"><span class="mini-kpi__val">4</span><span class="mini-kpi__label">Institutional</span></div>
    <div class="mini-kpi mini-kpi--red"><span class="mini-kpi__val">3</span><span class="mini-kpi__label">Expired this month</span></div>
  </div>
  <div class="filters animate-3">
    <button class="tab" [class.active]="filtre==='all'" (click)="filtre='all'">All</button>
    <button class="tab" [class.active]="filtre==='FREE'" (click)="filtre='FREE'">Free</button>
    <button class="tab" [class.active]="filtre==='PREMIUM'" (click)="filtre='PREMIUM'">Premium</button>
    <button class="tab" [class.active]="filtre==='INSTITUTIONAL'" (click)="filtre='INSTITUTIONAL'">Institutional</button>
  </div>
  <div class="table-wrap animate-4">
    <table>
      <thead><tr><th>User</th><th>Plan</th><th>Status</th><th>Start</th><th>End</th><th>Actions</th></tr></thead>
      <tbody>
        <tr *ngFor="let a of filteredSubscriptions">
          <td><strong>{{ a.user }}</strong><br><span style="color:var(--text-muted);font-size:11px">{{ a.email }}</span></td>
          <td><span class="kh-badge" [class]="a.plan==='PREMIUM'?'kh-badge--orange':a.plan==='INSTITUTIONAL'?'kh-badge--violet':'kh-badge--gray'">{{ a.plan }}</span></td>
          <td><span class="kh-badge" [class]="a.status==='ACTIVE'?'kh-badge--green':'kh-badge--red'">{{ a.status }}</span></td>
          <td style="color:var(--text-secondary)">{{ a.debut }}</td>
          <td [style.color]="a.status==='EXPIRED'?'var(--red)':'var(--text-secondary)'">{{ a.fin }}</td>
          <td><div class="actions"><button class="kh-btn kh-btn--ghost kh-btn--sm">Renouveler</button><button class="kh-btn kh-btn--danger kh-btn--sm">Suspendre</button></div></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
