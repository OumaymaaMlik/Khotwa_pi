name: CI - Build & Push Docker Images

# ─────────────────────────────────────────────
# DÉCLENCHEUR : à chaque push sur la branche main
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ════════════════════════════════════════════
  # JOB 1 : Builder et pusher le Backend (Spring Boot)
  # ════════════════════════════════════════════
  build-backend:
    name: 🔧 Build & Push Backend
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source du repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Se connecter à Docker Hub avec les secrets GitHub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Activer BuildKit (builder Docker avancé, plus rapide)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Builder l'image et la pousser sur Docker Hub
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./khotwa-backend        # dossier contenant le Dockerfile backend
          file: ./khotwa-backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/khotwa-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/khotwa-backend:${{ github.sha }}

  # ════════════════════════════════════════════
  # JOB 2 : Builder et pusher le Frontend (Angular)
  # ════════════════════════════════════════════
  build-frontend:
    name: 🎨 Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source du repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Activer BuildKit
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Builder l'image et la pousser sur Docker Hub
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./khotwa-frontend       # dossier contenant le Dockerfile frontend
          file: ./khotwa-frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/khotwa-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/khotwa-frontend:${{ github.sha }}