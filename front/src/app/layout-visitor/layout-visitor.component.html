<div class="ent-shell">

  <header class="ent-nav" [class.ent-nav--scrolled]="scrolled">
    <div class="ent-nav__inner">

      <a routerLink="/visitor/dashboard" class="ent-brand">
        <img src="assets/khotwa-logo.png" alt="KHOTWA" class="brand-logo-img" style="height:36px;width:auto;object-fit:contain;" />
        <span class="ent-brand__tag">Talent · Visitor</span>
      </a>

      <nav class="ent-nav__links">
        <a *ngFor="let item of navItems"
           class="ent-link"
           [class.ent-link--active]="isActive(item.route)"
           [routerLink]="getRoute(item.route)">
          <span class="ent-link__icon" [innerHTML]="getIcon(item.icon)"></span>
          <span>{{ item.label }}</span>
          <span class="ent-link__pip" *ngIf="isActive(item.route)"></span>
        </a>
      </nav>

      <div class="ent-nav__actions">

        <!-- NOTIFICATIONS -->
        <div class="notif-wrapper">

          <button class="ent-icon-btn"
                  (click)="notifOpen=!notifOpen"
                  [class.ent-icon-btn--active]="notifOpen"
                  aria-label="Notifications"
                  [attr.aria-expanded]="notifOpen">

            <span [innerHTML]="getIcon('bell')"></span>

            <span class="notif-dot" *ngIf="nonLus > 0">
              {{ nonLus }}
            </span>

          </button>

          <div class="ent-notif-panel" *ngIf="notifOpen">
            <div class="ent-notif-panel__head">
              <span>Notifications</span>
              <button (click)="notifService.markAllRead(); notifOpen=false">
                Mark all read
              </button>
            </div>

            <div *ngFor="let n of notifs"
                 class="ent-notif-item"
                 [class.unread]="!n.lu"
                 (click)="notifService.markRead(n.id)">

              <div class="ent-notif-item__dot" [class]="'dot-'+n.type"></div>

              <div>
                <p class="ent-notif-item__title">{{ n.titre }}</p>
                <p class="ent-notif-item__msg">{{ n.message }}</p>
              </div>

            </div>
          </div>
        </div>

        <!-- HOME -->
        <a routerLink="/"
           class="ent-icon-btn"
           title="Home"
           aria-label="Home">

          <span [innerHTML]="getIcon('home')"></span>
        </a>

        <!-- USER MENU -->
        <div class="ent-user"
             (click)="userMenuOpen=!userMenuOpen"
             #userMenu>

          <div class="ent-user__avatar">{{ userInitials }}</div>

          <div class="ent-user__info">
            <span class="ent-user__name">
              {{ auth.currentUser?.firstName }}
            </span>
            <span class="ent-user__role">Visitor</span>
          </div>

          <svg class="ent-user__chevron"
               [class.rotated]="userMenuOpen"
               width="12" height="12"
               viewBox="0 0 24 24"
               fill="none"
               stroke="currentColor"
               stroke-width="2.5">
            <path d="m6 9 6 6 6-6"/>
          </svg>

          <div class="ent-user__menu" *ngIf="userMenuOpen">

            <div class="ent-user__menu-header">
              <p class="menu-name">
                {{ auth.currentUser?.firstName }}
                {{ auth.currentUser?.lastName }}
              </p>
              <p class="menu-email">
                {{ auth.currentUser?.emailAddress }}
              </p>
            </div>

            <button class="menu-item menu-item--logout"
                    (click)="logout()"
                    aria-label="Sign out">

              <span [innerHTML]="getIcon('logout')"></span>
              Sign out
            </button>

          </div>
        </div>

        <!-- BURGER -->
        <button class="ent-burger"
                (click)="mobileOpen=!mobileOpen"
                aria-label="Open menu"
                [attr.aria-expanded]="mobileOpen">

          <span></span><span></span><span></span>
        </button>

      </div>
    </div>

    <!-- MOBILE NAV -->
    <div class="ent-mobile-nav" [class.open]="mobileOpen">
      <a *ngFor="let item of navItems"
         class="ent-mobile-link"
         [class.ent-mobile-link--active]="isActive(item.route)"
         [routerLink]="getRoute(item.route)"
         (click)="mobileOpen=false">

        <span [innerHTML]="getIcon(item.icon)"></span>
        {{ item.label }}
      </a>
    </div>

  </header>

  <!-- OVERLAY -->
  <div class="ent-overlay"
       *ngIf="mobileOpen"
       (click)="mobileOpen=false">
  </div>

  <!-- HERO -->
  <div class="ent-hero-band">
    <div class="ent-hero-band__orb ent-hero-band__orb--1"></div>
    <div class="ent-hero-band__orb ent-hero-band__orb--2"></div>
  </div>

  <!-- MAIN -->
  <main class="ent-main">
    <div class="ent-content">
      <router-outlet></router-outlet>
    </div>
  </main>

  <app-footer></app-footer>

</div>
