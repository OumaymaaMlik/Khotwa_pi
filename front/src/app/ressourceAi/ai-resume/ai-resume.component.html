<div class="resume-overlay" (click)="close()">
  <div class="resume-modal" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="resume-header">
      <div class="resume-header-left">
        <span class="resume-spark">✦</span>
        <div>
          <div class="resume-title">Résumé IA</div>
          <div class="resume-subtitle">Généré par l'intelligence artificielle</div>
        </div>
      </div>
      <button class="resume-close" (click)="close()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Ressource info -->
    <div class="resume-resource-info" *ngIf="titre">
      <span class="resume-resource-icon">
        <ng-container [ngSwitch]="type">
          <span *ngSwitchCase="'PDF'">📄</span>
          <span *ngSwitchCase="'VIDEO'">🎥</span>
          <span *ngSwitchCase="'EXCEL'">📊</span>
          <span *ngSwitchDefault>📁</span>
        </ng-container>
      </span>
      <span class="resume-resource-title">{{ titre }}</span>
    </div>

    <!-- Contenu -->
    <div class="resume-body">

      <!-- Chargement -->
      <div class="resume-loading" *ngIf="isLoading">
        <div class="resume-loading-dots">
          <span></span><span></span><span></span>
        </div>
        <p>L'IA génère le résumé…</p>
      </div>

      <!-- Erreur -->
      <div class="resume-error" *ngIf="error">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>{{ error }}</p>
        <button class="resume-retry-btn" (click)="generate()">Réessayer</button>
      </div>

      <!-- Résumé -->
      <div class="resume-text" *ngIf="resume && !isLoading">
        <div class="resume-quote-mark">"</div>
        <p>{{ resume }}</p>
      </div>

    </div>

    <!-- Footer actions -->
    <div class="resume-footer" *ngIf="resume && !isLoading">
      <button class="resume-action-btn resume-action-btn--ghost" (click)="generate()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
        </svg>
        Regénérer
      </button>
      <button class="resume-action-btn resume-action-btn--primary" (click)="copy()">
        <ng-container *ngIf="!copied">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copier
        </ng-container>
        <ng-container *ngIf="copied">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Copié !
        </ng-container>
      </button>
    </div>

  </div>
</div>
